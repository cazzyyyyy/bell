<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leviticus</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; transition:0.4s ease; }

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background-image: url('https://4kwallpapers.com/images/wallpapers/lofi-night-city-3840x2160-14857.jpg');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
}

body.fade-out { opacity: 0; }

/* NAVBAR */
.navbar {
    position: fixed;
    top:0;
    width:100%;
    background:black;
    padding:25px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

.logo { color:white; font-size:32px; font-weight:bold; }

.nav-links a {
    color:white;
    text-decoration:none;
    margin-left:30px;
    font-size:20px;
    font-weight:bold;
}

.nav-links a:hover { color:gray; }

/* CONTENT */
.content { padding-top:150px; }

/* PROFILE */
.profile-section {
    display:flex;
    gap:80px;
    padding:0 10%;
    flex-wrap:wrap;
    align-items:center;
}

.profile-pic {
    width:300px;
    height:300px;
    border-radius:50%;
    border:6px solid black;
    overflow:hidden;
}

.profile-pic img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.profile-info h2 {
    font-size:48px;
    margin-bottom:20px;
}

.profile-info p {
    font-size:22px;
}

/* BIO */
.bio {
    margin:60px 10%;
    background:white;
    border:5px solid black;
    padding:30px;
    border-radius:20px;
    font-size:20px;
    line-height:1.7;
}

/* MUSIC PLAYER */
.music-box {
    margin:40px 10%;
    display:flex;
    align-items:center;
    background:white;
    border:4px solid black;
    border-radius:15px;
    padding:15px 25px;
    gap:20px;
    width:fit-content;
    cursor:pointer;
}

.music-circle {
    width:60px;
    height:60px;
    border-radius:50%;
    border:3px solid black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    background:#eee;
}

.music-box:hover {
    background:black;
    color:white;
}

.music-box:hover .music-circle {
    background:white;
    color:black;
}

.song-name {
    font-size:20px;
    font-weight:bold;
}

/* SECTIONS */
.section {
    margin:60px 10%;
}

.section h3 {
    font-size:28px;
    margin-bottom:20px;
}

/* IMAGE GRID */
.grid {
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.grid img {
    width:200px;
    height:150px;
    object-fit:cover;
    border:3px solid black;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Hidden Profile</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
    </div>
</div>

<div class="content">

    <!-- PROFILE -->
    <div class="profile-section">
        <div class="profile-pic">
            <img src="leviticus.jpg">
        </div>

        <div class="profile-info">
            <h2>Leviticus</h2>
            <p>Age: ???</p>
            <p>Occupation: ???</p>
            <p>Location: Unknown</p>
        </div>
    </div>

    <!-- BIO -->
    <div class="bio">
        <strong>BIO:</strong><br><br>
        A hidden presence. Only those who know the name can find this place.
        Silent, observant, and always watching from the background.
    </div>

    <!-- MUSIC -->
    <div class="music-box" id="musicBox">
        <div class="music-circle" id="playBtn">▶</div>
        <div class="song-name">Secret Theme</div>
    </div>

    <!-- MEMORIES -->
    <div class="section">
        <h3>MEMORIES:</h3>
        <div class="grid">
            <img src="mem1.jpg">
            <img src="mem2.jpg">
            <img src="mem3.jpg">
        </div>
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="section">
        <h3>ACHIEVEMENTS:</h3>
        <div class="grid">
            <img src="ach1.jpg">
            <img src="ach2.jpg">
            <img src="ach3.jpg">
        </div>
    </div>

    <!-- PHOTOS -->
    <div class="section">
        <h3>PHOTOS:</h3>
        <div class="grid">
            <img src="pic1.jpg">
            <img src="pic2.jpg">
            <img src="pic3.jpg">
        </div>
    </div>

</div>

<!-- MUSIC SCRIPT -->
<script>
window.addEventListener("load", () => {
    document.body.style.opacity = "1";
});

// MUSIC TOGGLE
let playing = false;
const player = document.createElement("iframe");
player.width = "0";
player.height = "0";
player.allow = "autoplay";
document.body.appendChild(player);

const btn = document.getElementById("playBtn");
const box = document.getElementById("musicBox");

box.addEventListener("click", () => {
    if (!playing) {
        player.src = "https://www.youtube.com/embed/87tFbeaxsgA?autoplay=1";
        btn.textContent = "⏸";
        playing = true;
    } else {
        player.src = "";
        btn.textContent = "▶";
        playing = false;
    }
});
</script>

</body>
</html>
