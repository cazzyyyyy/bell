<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>
<style>
body {
    opacity: 1;
    transition: opacity 0.4s ease;
}
body.fade-out {
    opacity: 0;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    transition: 0.4s ease;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background-image: url('https://cdn.pixabay.com/photo/2023/10/10/12/36/lofi-8306352_1280.jpg'); /* your image */
    background-size: cover;       /* fill the viewport */
    background-position: top center;  /* align top so navbar sits on top */
    background-repeat: no-repeat;
    margin: 0;
    padding: 0;
}



/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background-color: black;
    padding: 25px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.logo {
    color: white;
    font-size: 32px;
    font-weight: bold;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 40px;
    font-size: 22px;
    font-weight: bold;
}

.nav-links a:hover {
    color: gray;
}

/* CONTENT */
.content {
    padding-top: 170px;
    text-align: center;
}

/* PAGE TITLE */
.page-title {
    font-size: 64px;
    font-weight: bold;
    margin-bottom: 60px;
    color: white;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
}

/* CIRCLE GRID */
.circle-grid {
    display: flex;
    justify-content: center;
    gap: 60px;
    flex-wrap: wrap;
}

/* PROFILE CIRCLES */
.profile-circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 6px solid black;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
}

.profile-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.profile-circle:hover {
    transform: scale(1.08);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

/* SIMPLE FADE TRANSITION */
body.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
}

.search-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 140px;
    margin-bottom: 30px;
    width: 100%;
    position: relative;
    z-index: 2000;   /* ABOVE NAVBAR */
}

#searchInput {
    padding: 10px 15px;
    font-size: 18px;
    width: 250px;
    border: 2px solid black;
    border-radius: 8px;
}



</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">My Profiles</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <button id="themeToggle">Toggle Theme</button>
    </div>
</div>

<!-- MOVE SEARCH BAR HERE, OUTSIDE NAVBAR -->
<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search profiles...">
    <button onclick="searchProfile()">Search</button>
</div>

<div class="content">
    <div class="page-title">HOME</div>
    <div class="circle-grid">
        <div class="profile-circle" data-link="profile.html">
            <img src="1.jpg" alt="Profile 1">
        </div>
        <div class="profile-circle" data-link="profile2.html">
            <img src="2.1.jpg" alt="Profile 2">
        </div>
        <div class="profile-circle" data-link="profile3.html">
            <img src="3.1.jpg" alt="Profile 3">
        </div>
        <div class="profile-circle" data-link="profile4.html">
            <img src="4.jpg" alt="Profile 4">
        </div>
        <div class="profile-circle" data-link="profile5.html">
            <img src="5.jpg" alt="Profile 5">
        </div>
    </div>
</div>

<script>
// Generic fade transition
function goToPage(url) {
    document.body.classList.add("fade-out");
    setTimeout(() => window.location.href = url, 400); // match CSS
}

// Fade-out class
document.body.style.opacity = "1"; // ensure visible on load

// Profile circles
document.querySelectorAll(".profile-circle").forEach(circle => {
    circle.addEventListener("click", () => {
        const link = circle.getAttribute("data-link");
        goToPage(link);
    });
});

// Menu links
document.querySelectorAll(".nav-links a").forEach(link => {
    link.addEventListener("click", (e) => {
        e.preventDefault();
        goToPage(link.href);
    });
});

// Envelopes if on home page
document.querySelectorAll(".envelope-container .envelope a").forEach(env => {
    env.addEventListener("click", (e) => {
        e.preventDefault();
        goToPage(env.href);
    });
});
</script>


<script>
const themeToggle = document.getElementById('themeToggle');
const body = document.body;

// Add your three background images here
const themes = [
    "url('https://images.wallpaperscraft.com/image/single/cat_art_window_140051_2560x1080.jpg')", // first click
    "url('https://cdn.wallpapersafari.com/23/57/47iB0A.jpg')", // second click
    "url('https://4kwallpapers.com/images/wallpapers/lofi-night-city-3840x2160-14857.jpg')" // third click = back to original
];

let themeIndex = 0;

themeToggle.addEventListener('click', () => {
    // Change background image
    body.style.backgroundImage = themes[themeIndex];

    // Optional: smooth transition
    body.style.transition = "background-image 0.8s ease, background-color 0.8s ease";

    // Increment theme index
    themeIndex = (themeIndex + 1) % themes.length;
});
</script>

	<script>
function searchProfile() {
    let input = document.getElementById("searchInput").value.trim().toUpperCase();

    // Secret hidden profile
    if (input === "LEVITICUS") {
        window.location.href = "leviticus.html";
        return;
    }

    // List of normal profiles
    const profiles = {
        "CASSANDRA": "profile.html",
        "JASON": "profile2.html",
        "ISHMAEL": "profile3.html",
        "ALE": "profile4.html",
        "DAVID": "profile5.html"
    };

    // Loop through profile names to find a match
    for (let name in profiles) {
        if (input.includes(name)) {
            window.location.href = profiles[name];
            return;
        }
    }

    alert("Profile not found.");
}
	</script>
</body>
</html>
