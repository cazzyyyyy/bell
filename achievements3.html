<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACHIEVEMENTS</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; transition:0.4s ease; }

body {
    font-family: Arial, sans-serif;
    background-image: url('https://4kwallpapers.com/images/wallpapers/lofi-japanese-4480x2520-14884.jpg');
    background-size: cover; background-position:center 25%; background-repeat:no-repeat;
    background-attachment: fixed; min-height:100vh;
}

/* NAVBAR */
.navbar { position: fixed; top:0; width:100%; background-color:black; padding:25px 60px;
    display:flex; justify-content:space-between; align-items:center; z-index:1000; }
.logo { color:white; font-size:32px; font-weight:bold; }
.nav-links a { color:white; text-decoration:none; margin-left:40px; font-size:22px; font-weight:bold; }
.nav-links a:hover { color:gray; }

/* CONTENT */
.content { padding-top:170px; text-align:center; }

/* PAGE TITLE */
.page-title { font-size:64px; font-weight:bold; margin-bottom:50px;
    color:white; text-shadow:2px 2px 6px rgba(0,0,0,0.7);
    opacity:0; transform:translateY(30px); transition:opacity 0.8s ease, transform 0.8s ease; }

/* PHOTO GRID */
.photo-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:40px; padding:0 10%; }

/* PHOTO RECTANGLES */
.photo-rect { width:300px; height:200px; background:white; border:6px solid black;
    border-radius:12px; overflow:hidden; display:flex; align-items:center; justify-content:center;
    font-size:20px; font-weight:bold; color:#333; cursor:pointer;
    opacity:0; transform:translateY(40px); transition:opacity 0.6s ease, transform 0.6s ease; }
.photo-rect:hover { transform:scale(1.05); box-shadow:0 15px 30px rgba(0,0,0,0.4); }

    .photo-rect img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="logo">My Profile</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="profile3.html">Profile</a>
        <a href="memories3.html">Memories</a>
        <a href="achievements3.html">Achievements</a>
        <a href="photos3.html">Photos</a>
    </div>
</div>

<div class="content">
    <div class="page-title">ACHIEVEMENTS</div>
    <div class="photo-grid">
        <div class="photo-rect"><img src="ish1a.jpg" alt="Achievement 1"></div>
        <div class="photo-rect"><img src="ish2a.jpg" alt="Achievement 2"></div>
        <div class="photo-rect"><img src="ish3a.jpg" alt="Achievement 3"></div>
    </div>
</div>

<script>
window.addEventListener("load", () => {
    const title = document.querySelector(".page-title");
    requestAnimationFrame(()=>{ title.style.opacity="1"; title.style.transform="translateY(0)"; });
    const photos=document.querySelectorAll(".photo-rect");
    photos.forEach((photo,i)=>{ setTimeout(()=>{ photo.style.opacity="1"; photo.style.transform="translateY(0)"; }, i*150); });
});
</script>

</body>
</html>
